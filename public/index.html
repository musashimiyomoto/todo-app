<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242834;--border:#2e3345;--text:#e1e4ed;--text2:#8b90a0;--accent:#6c8cff;--accent-hover:#8aa4ff;--red:#ff6b6b;--red-hover:#ff8787;--green:#51cf66;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}

.app{max-width:960px;margin:0 auto;padding:24px 16px}
h1{font-size:1.5rem;font-weight:600;margin-bottom:24px;color:var(--text)}
h2{font-size:1.1rem;font-weight:600;margin-bottom:16px;color:var(--text2)}

.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:10px 20px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:.9rem;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.section{display:none}
.section.active{display:block}

.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-size:.85rem}
.toolbar input:focus{outline:none;border-color:var(--accent)}

button{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:var(--radius);cursor:pointer;font-size:.85rem;transition:.15s}
button:hover{background:var(--accent-hover)}
button.danger{background:var(--red)}
button.danger:hover{background:var(--red-hover)}
button.sm{padding:5px 10px;font-size:.8rem}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.card-body{flex:1;min-width:0}
.card-title{font-weight:600;font-size:.95rem;margin-bottom:4px}
.card-meta{font-size:.8rem;color:var(--text2)}
.card-actions{display:flex;gap:6px;flex-shrink:0}

.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600}
.badge.done{background:#51cf6622;color:var(--green)}
.badge.pending{background:#ffd43b22;color:#ffd43b}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:420px}
.modal h3{margin-bottom:16px;font-size:1rem}
.modal label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:4px;margin-top:12px}
.modal input,.modal textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-size:.85rem;font-family:inherit}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent)}
.modal textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.stat-value{font-size:1.8rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:.8rem;color:var(--text2);margin-top:4px}

.empty{text-align:center;padding:40px;color:var(--text2);font-size:.9rem}
.toast{position:fixed;bottom:20px;right:20px;background:var(--red);color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:.85rem;z-index:200;animation:slideIn .2s}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div class="app">
  <h1>📋 Todo App</h1>

  <div class="tabs">
    <button class="tab active" data-tab="users">Users</button>
    <button class="tab" data-tab="tasks">Tasks</button>
    <button class="tab" data-tab="stats">Statistics</button>
  </div>

  <!-- USERS -->
  <div class="section active" id="sec-users">
    <div class="toolbar">
      <button onclick="openModal('create-user')">+ New User</button>
    </div>
    <div id="users-list"></div>
  </div>

  <!-- TASKS -->
  <div class="section" id="sec-tasks">
    <div class="toolbar">
      <button onclick="openModal('create-task')">+ New Task</button>
      <input id="tasks-filter-user" type="number" placeholder="Filter by user ID" min="1">
      <button onclick="loadTasks()">Filter</button>
    </div>
    <div id="tasks-list"></div>
  </div>

  <!-- STATISTICS -->
  <div class="section" id="sec-stats">
    <div class="toolbar">
      <input id="stats-user" type="number" placeholder="User ID" min="1">
      <input id="stats-from" type="date">
      <input id="stats-to" type="date">
      <button onclick="loadStats()">Load</button>
    </div>
    <div id="stats-grid" class="stats-grid"></div>
  </div>
</div>

<!-- Create User Modal -->
<div class="modal-overlay" id="modal-create-user">
  <div class="modal">
    <h3>New User</h3>
    <label>Full Name *</label>
    <input id="cu-name" placeholder="John Doe">
    <label>Phone Number</label>
    <input id="cu-phone" placeholder="+1234567890">
    <div class="modal-actions">
      <button onclick="closeModal('create-user')">Cancel</button>
      <button onclick="createUser()">Create</button>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div class="modal-overlay" id="modal-edit-user">
  <div class="modal">
    <h3>Edit User</h3>
    <input type="hidden" id="eu-id">
    <label>Full Name</label>
    <input id="eu-name">
    <label>Phone Number</label>
    <input id="eu-phone" placeholder="+1234567890">
    <div class="modal-actions">
      <button onclick="closeModal('edit-user')">Cancel</button>
      <button onclick="updateUser()">Save</button>
    </div>
  </div>
</div>

<!-- Create Task Modal -->
<div class="modal-overlay" id="modal-create-task">
  <div class="modal">
    <h3>New Task</h3>
    <label>Title *</label>
    <input id="ct-title" placeholder="Task title">
    <label>Description</label>
    <textarea id="ct-desc" placeholder="Optional description"></textarea>
    <label>Author User ID *</label>
    <input id="ct-author" type="number" min="1">
    <div class="modal-actions">
      <button onclick="closeModal('create-task')">Cancel</button>
      <button onclick="createTask()">Create</button>
    </div>
  </div>
</div>

<!-- Edit Task Modal -->
<div class="modal-overlay" id="modal-edit-task">
  <div class="modal">
    <h3>Edit Task</h3>
    <input type="hidden" id="et-id">
    <label>Title</label>
    <input id="et-title">
    <label>Description</label>
    <textarea id="et-desc"></textarea>
    <div class="modal-actions">
      <button onclick="closeModal('edit-task')">Cancel</button>
      <button onclick="updateTask()">Save</button>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('sec-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'users') loadUsers();
    if (tab.dataset.tab === 'tasks') loadTasks();
    if (tab.dataset.tab === 'stats') loadStats();
  });
});

// Toast
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Modal
function openModal(name) { document.getElementById('modal-' + name).classList.add('open'); }
function closeModal(name) { document.getElementById('modal-' + name).classList.remove('open'); }

// API helper
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: opts.body ? { 'Content-Type': 'application/json' } : {},
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) {
    toast(data.message || data.error || 'Error');
    throw new Error(data.message);
  }
  return data;
}

// ── USERS ──

async function loadUsers() {
  const users = await api('/users');
  const el = document.getElementById('users-list');
  if (!users || !users.length) { el.innerHTML = '<div class="empty">No users yet</div>'; return; }
  el.innerHTML = users.map(u => `
    <div class="card">
      <div class="card-body">
        <div class="card-title">${esc(u.full_name)}</div>
        <div class="card-meta">ID: ${u.id}${u.phone_number ? ' · ' + esc(u.phone_number) : ''}</div>
      </div>
      <div class="card-actions">
        <button class="sm" onclick="openEditUser(${u.id},'${esc(u.full_name)}','${esc(u.phone_number || '')}')">Edit</button>
        <button class="sm danger" onclick="deleteUser(${u.id})">Delete</button>
      </div>
    </div>
  `).join('');
}

async function createUser() {
  const name = document.getElementById('cu-name').value.trim();
  const phone = document.getElementById('cu-phone').value.trim();
  if (!name) { toast('Full name is required'); return; }
  const body = { full_name: name };
  if (phone) body.phone_number = phone;
  await api('/users', { method: 'POST', body });
  closeModal('create-user');
  document.getElementById('cu-name').value = '';
  document.getElementById('cu-phone').value = '';
  loadUsers();
}

function openEditUser(id, name, phone) {
  document.getElementById('eu-id').value = id;
  document.getElementById('eu-name').value = name;
  document.getElementById('eu-phone').value = phone;
  openModal('edit-user');
}

async function updateUser() {
  const id = document.getElementById('eu-id').value;
  const name = document.getElementById('eu-name').value.trim();
  const phone = document.getElementById('eu-phone').value.trim();
  const body = {};
  if (name) body.full_name = name;
  body.phone_number = phone || null;
  await api('/users/' + id, { method: 'PATCH', body });
  closeModal('edit-user');
  loadUsers();
}

async function deleteUser(id) {
  if (!confirm('Delete user ' + id + '?')) return;
  await api('/users/' + id, { method: 'DELETE' });
  loadUsers();
}

// ── TASKS ──

async function loadTasks() {
  const uid = document.getElementById('tasks-filter-user')?.value;
  const qs = uid ? '?user_id=' + uid : '';
  const tasks = await api('/tasks' + qs);
  const el = document.getElementById('tasks-list');
  if (!tasks || !tasks.length) { el.innerHTML = '<div class="empty">No tasks yet</div>'; return; }
  el.innerHTML = tasks.map(t => `
    <div class="card">
      <div class="card-body">
        <div class="card-title">
          ${esc(t.title)}
          <span class="badge ${t.completed ? 'done' : 'pending'}">${t.completed ? 'Done' : 'Pending'}</span>
        </div>
        <div class="card-meta">
          ID: ${t.id} · Author: ${t.author_user_id} · ${new Date(t.created_at).toLocaleDateString()}
          ${t.description ? ' · ' + esc(t.description) : ''}
        </div>
      </div>
      <div class="card-actions">
        ${!t.completed ? `<button class="sm" onclick="completeTask(${t.id})" style="background:var(--green)">✓</button>` : ''}
        <button class="sm" onclick="openEditTask(${t.id},'${escAttr(t.title)}','${escAttr(t.description || '')}')">Edit</button>
        <button class="sm danger" onclick="deleteTask(${t.id})">Delete</button>
      </div>
    </div>
  `).join('');
}

async function createTask() {
  const title = document.getElementById('ct-title').value.trim();
  const desc = document.getElementById('ct-desc').value.trim();
  const author = parseInt(document.getElementById('ct-author').value);
  if (!title || !author) { toast('Title and Author are required'); return; }
  const body = { title, author_user_id: author };
  if (desc) body.description = desc;
  await api('/tasks', { method: 'POST', body });
  closeModal('create-task');
  document.getElementById('ct-title').value = '';
  document.getElementById('ct-desc').value = '';
  document.getElementById('ct-author').value = '';
  loadTasks();
}

function openEditTask(id, title, desc) {
  document.getElementById('et-id').value = id;
  document.getElementById('et-title').value = title;
  document.getElementById('et-desc').value = desc;
  openModal('edit-task');
}

async function updateTask() {
  const id = document.getElementById('et-id').value;
  const title = document.getElementById('et-title').value.trim();
  const desc = document.getElementById('et-desc').value.trim();
  const body = {};
  if (title) body.title = title;
  body.description = desc || null;
  await api('/tasks/' + id, { method: 'PATCH', body });
  closeModal('edit-task');
  loadTasks();
}

async function completeTask(id) {
  await api('/tasks/' + id, { method: 'PATCH', body: { completed: true } });
  loadTasks();
}

async function deleteTask(id) {
  if (!confirm('Delete task ' + id + '?')) return;
  await api('/tasks/' + id, { method: 'DELETE' });
  loadTasks();
}

// ── STATISTICS ──

async function loadStats() {
  const params = new URLSearchParams();
  const uid = document.getElementById('stats-user')?.value;
  const from = document.getElementById('stats-from')?.value;
  const to = document.getElementById('stats-to')?.value;
  if (uid) params.set('user_id', uid);
  if (from) params.set('from', from);
  if (to) params.set('to', to);
  const qs = params.toString() ? '?' + params.toString() : '';
  const s = await api('/statistics' + qs);
  if (!s) return;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-value">${s.TasksCreated}</div><div class="stat-label">Tasks Created</div></div>
    <div class="stat-card"><div class="stat-value">${s.TasksCompleted}</div><div class="stat-label">Tasks Completed</div></div>
    <div class="stat-card"><div class="stat-value">${s.TasksCompletedRate != null ? s.TasksCompletedRate + '%' : '—'}</div><div class="stat-label">Completion Rate</div></div>
    <div class="stat-card"><div class="stat-value">${s.TasksAverageCompletionTime || '—'}</div><div class="stat-label">Avg Completion Time</div></div>
  `;
}

// Helpers
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// Init
loadUsers();
</script>
</body>
</html>
